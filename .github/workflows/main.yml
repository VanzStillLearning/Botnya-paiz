name: RDP-BOT-WA-AUTO-LOOP

on:
  workflow_dispatch:
  schedule:
    # Dikembalikan ke tiap 5 jam
    - cron: '0 */5 * * *'

jobs:
  build:
    runs-on: windows-latest
    timeout-minutes: 360
    permissions:
      contents: write

    steps:
      - name: "1. Checkout Repository"
        uses: actions/checkout@v4

      - name: "2. Setup Environment"
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          netsh advfirewall firewall add rule name="RDP" dir=in action=allow protocol=TCP localport=3389

      - name: "3. Create Admin User"
        run: |
          $pass = ConvertTo-SecureString "ServerKuat99@!" -AsPlainText -Force
          New-LocalUser -Name "RDP" -Password $pass
          Add-LocalGroupMember -Group "Administrators" -Member "RDP"

      - name: "4. Setup Tailscale"
        run: |
          $tsUrl = "https://dl.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "$env:TEMP\tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "`"$env:TEMP\tailscale.msi`"", "/quiet", "/norestart" -Wait
          Start-Sleep -Seconds 15
          & "$env:ProgramFiles\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=windows-rdp --accept-dns=false
          $tsIP = & "$env:ProgramFiles\Tailscale\tailscale.exe" ip -4
          Write-Host "==============================="
          Write-Host "IP RDP: $tsIP"
          Write-Host "==============================="

      - name: "4.5 Cache Node Modules"
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: "5. Run Bot with Auto-Restart"
        run: |
          npm install
          $script = @"
          while(`$true) {
              Write-Host "Menjalankan Bot..."
              node index.js
              Write-Host "Bot crash, restart dalam 5 detik..."
              Start-Sleep -Seconds 5
          }
          "@
          $script | Out-File -FilePath "start_bot.ps1"
          Start-Process powershell -ArgumentList "-ExecutionPolicy Bypass -File start_bot.ps1" -WindowStyle Normal

      - name: "6. Keep Alive (Durasi 5 Jam)"
        run: |
          Write-Host "Server berjalan... Menunggu 5 jam (18000 detik) sebelum auto-backup."
          Start-Sleep -Seconds 18000

      - name: "7. Auto-Backup Semua Perubahan File"
        if: always()
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          
          # Bikin file .gitignore (kalau belum ada) biar folder node_modules ga ikut ke-upload
          if (!(Test-Path .gitignore)) { 
              "node_modules/" | Out-File -FilePath .gitignore -Encoding utf8 
          }
          
          # Deteksi SEMUA perubahan (file baru, file diedit, file dihapus)
          git add -A
          
          # Bandingkan file lama vs baru, kalau ada yang beda baru di-push
          $status = git status --porcelain
          if ($status) {
              Write-Host "Ada file yang berubah! Melakukan proses backup..."
              git commit -m "Auto-backup semua folder/file: $(Get-Date -Format 'yyyy-MM-dd HH:mm')"
              git pull --rebase origin main
              git push origin main
              Write-Host "Backup selesai!"
          } else {
              Write-Host "Tidak ada perubahan pada file. Melewati proses backup."
          }

      - name: "8. Auto-Up (Trigger Siklus Berikutnya)"
        if: always()
        env:
          # WAJIB dibikin PAT_TOKEN di GitHub Secrets agar sistem estafet ini jalan
          GH_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          # PENTING: Ganti "nama-file-workflow.yml" di bawah ini dengan nama file yaml lu yang sebenarnya!
          gh workflow run "main.yml" --ref main

          
